<div class="details-container">
  <div class="details-card">
    <div class="header">
      <h2>User Profile</h2>
    </div>
    <div class="content">
      <div class="info-group">
        <label> Name</label>
        <p>{{user.name }}</p>
      </div>
      <div class="info-group">
        <label> Surname</label>
        <p>{{user.surname }}</p>
      </div>  
      <div class="info-group">
        <label>Email Address</label>
        <p>{{ user.email }}</p>
      </div>
    </div>
  </div>
</div>
